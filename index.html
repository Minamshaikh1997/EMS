<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Leave Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            transition: background 0.3s ease;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 44px 36px;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .logo-icon i {
            color: white;
            font-size: 28px;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 800;
            font-size: 26px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 28px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #334155;
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            transition: all 0.25s ease;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .form-control:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 13px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            margin-top: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e2e8f0;
        }

        .divider-text {
            background: white;
            padding: 0 12px;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            padding: 10px;
            border-radius: 10px;
            background: rgba(102, 126, 234, 0.06);
        }

        .admin-link:hover {
            background: rgba(102, 126, 234, 0.12);
            color: #764ba2;
            text-decoration: none;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 32px 24px;
            }
            .login-box h2 {
                font-size: 22px;
            }
            .logo-icon {
                width: 54px;
                height: 54px;
            }
            .logo-icon i {
                font-size: 24px;
            }
        }

        /* Dark mode */
        body.dark-mode {
            background: linear-gradient(135deg, #000 0%, #0f172a 50%, #1e1b4b 100%);
        }

        .dark-mode .login-box {
            background: rgba(30, 41, 59, 0.97);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .dark-mode .login-box h2 { color: #f1f5f9; }
        .dark-mode .subtitle { color: #64748b; }
        .dark-mode .form-label { color: #cbd5e1; }
        .dark-mode .form-control {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }
        .dark-mode .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #667eea;
        }
        .dark-mode .divider::before { background: rgba(255, 255, 255, 0.1); }
        .dark-mode .divider-text { background: rgba(30, 41, 59, 0.97); color: #64748b; }
        .dark-mode .admin-link { background: rgba(102, 126, 234, 0.1); color: #a5b4fc; }
        .dark-mode .admin-link:hover { background: rgba(102, 126, 234, 0.2); }
        .dark-mode .footer-text { color: #475569; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-briefcase"></i>
            </div>
            <h2>Leave System</h2>
            <p class="subtitle">Employee Management Portal</p>
        </div>

        <form action="login.php" method="POST">
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-envelope" style="margin-right: 6px;"></i>Email
                </label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-lock" style="margin-right: 6px;"></i>Password
                </label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>Login
            </button>
        </form>

        <div class="divider">
            <span class="divider-text">Administrator</span>
        </div>

        <a href="admin/login.php" class="admin-link">
            <i class="fas fa-user-shield"></i>
            Admin Login
        </a>

        <div class="footer-text">
            &copy; 2026 Employee Leave System. All rights reserved.
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
